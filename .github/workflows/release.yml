name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "LICENSE"
      - "NOTICE"
      - "README.md"
      - "docs/ARCHITECTURE.md"
      - "docs/CLI.md"
      - "docs/CONFORMANCE.md"
      - "docs/DAEMON_SUPERVISION.md"
      - "docs/INSTALL.md"
      - "docs/MCP.md"
      - "docs/RELEASE.md"
      - "rust-toolchain.toml"
      - "crates/**"
      - "packaging/homebrew/**"
      - "packaging/launchd/**"
      - "packaging/systemd/**"
  workflow_dispatch:
    inputs:
      release_type:
        description: "SemVer bump to cut when version is omitted."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      version:
        description: "Optional exact SemVer version to cut, with or without the v prefix."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release ref
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      (
        !startsWith(github.event.head_commit.message, 'Cut browser-use-rs v') &&
        !startsWith(github.event.head_commit.message, 'Refresh lockfile for v')
      )
    outputs:
      ref: ${{ steps.prepare.outputs.ref }}
      tag: ${{ steps.prepare.outputs.tag }}
      version: ${{ steps.prepare.outputs.version }}
      should_release: ${{ steps.prepare.outputs.should_release }}
      release_type: ${{ steps.prepare.outputs.release_type }}
      release_reason: ${{ steps.prepare.outputs.release_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare release ref
        id: prepare
        shell: bash
        env:
          RELEASE_TYPE: ${{ inputs.release_type || 'auto' }}
          VERSION_INPUT: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "${GITHUB_REF_TYPE}" == "branch" ]]; then
            plan_output="$(mktemp)"
            python3 scripts/release-version.py \
              --release-type "${RELEASE_TYPE}" \
              --version "${VERSION_INPUT}" \
              --write \
              --allow-no-release \
              --github-output "${plan_output}"

            cat "${plan_output}" >> "${GITHUB_OUTPUT}"
            should_release="$(awk -F= '$1 == "should_release" { value = $2 } END { print value }' "${plan_output}")"
            version="$(awk -F= '$1 == "version" { value = $2 } END { print value }' "${plan_output}")"
            tag="$(awk -F= '$1 == "tag" { value = $2 } END { print value }' "${plan_output}")"

            if [[ "${should_release}" != "true" ]]; then
              {
                echo "ref=${GITHUB_SHA}"
                echo "tag=${tag}"
                echo "version=${version}"
              } >> "${GITHUB_OUTPUT}"
              exit 0
            fi


            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "Tag ${tag} already exists." >&2
              exit 1
            fi

            cargo check --workspace --all-targets
            git diff --check

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock crates/*/Cargo.toml
            git commit -m "Cut browser-use-rs ${tag}"
            git tag -a "${tag}" -m "browser-use-rs ${tag}"
            git push --atomic origin HEAD:main "${tag}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            python3 scripts/release-version.py \
              --check \
              --expect-version "${version}"
            echo "should_release=true" >> "${GITHUB_OUTPUT}"
          fi

          {
            echo "ref=refs/tags/${tag}"
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

  build-binary:
    name: Build ${{ matrix.label }} binary
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            runner: ubuntu-latest
            browser_smoke: true
          - label: macos
            runner: macos-latest
            browser_smoke: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify release version
        shell: bash
        run: python3 scripts/release-version.py --check --expect-version "${RELEASE_TAG#v}"

      - name: Verify
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Build
        run: cargo build --release -p browser-use-cli

      - name: Package
        shell: bash
        run: |
          target="$(rustc -vV | awk '/host:/ {print $2}')"
          mkdir -p dist/package/packaging/systemd dist/package/packaging/launchd
          cp target/release/browser-use-rs dist/package/browser-use-rs
          cp README.md LICENSE NOTICE dist/package/
          cp docs/INSTALL.md dist/package/INSTALL.md
          cp docs/RELEASE.md dist/package/RELEASE.md
          cp docs/DAEMON_SUPERVISION.md dist/package/DAEMON_SUPERVISION.md
          cp packaging/systemd/browser-use-rs.service dist/package/packaging/systemd/
          cp packaging/launchd/com.evalops.browser-use-rs.plist dist/package/packaging/launchd/
          tar -C dist/package -czf "dist/browser-use-rs-${RELEASE_TAG}-${target}.tar.gz" .

      - name: Smoke packaged artifact
        shell: bash
        run: |
          mkdir -p dist/smoke
          tar -C dist/smoke -xzf dist/*.tar.gz
          ./dist/smoke/browser-use-rs version-target
          ./dist/smoke/browser-use-rs mcp-tools > dist/smoke/mcp-tools.json
          grep -q '"browser_use_state"' dist/smoke/mcp-tools.json
          if [ "${{ matrix.browser_smoke }}" = "true" ]; then
            for attempt in 1 2; do
              echo "browser-backed package smoke attempt ${attempt}/2"
              rm -f dist/smoke/state.json
              if ./dist/smoke/browser-use-rs state "data:text/html,<html><head><title>artifact smoke</title></head><body><button>Run</button><input placeholder='Name'></body></html>" > dist/smoke/state.json; then
                break
              fi
              status="$?"
              if [ "${attempt}" = "2" ]; then
                exit "${status}"
              fi
              sleep 5
            done
            grep -q '"title": "artifact smoke"' dist/smoke/state.json
            grep -q '"interactive_elements": 2' dist/smoke/state.json
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          retention-days: 14
          name: browser-use-rs-${{ matrix.label }}
          path: dist/*.tar.gz

  publish-release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-binary
    if: needs.prepare-release.outputs.should_release == 'true'
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
      RELEASE_TYPE: ${{ needs.prepare-release.outputs.release_type }}
      RELEASE_REASON: ${{ needs.prepare-release.outputs.release_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: browser-use-rs-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum -- *.tar.gz > SHA256SUMS

      - name: Generate Homebrew formula
        run: |
          mkdir -p dist/homebrew
          tag="${RELEASE_TAG}"
          version="${RELEASE_TAG#v}"
          linux_archive="browser-use-rs-${RELEASE_TAG}-x86_64-unknown-linux-gnu.tar.gz"
          macos_archive="$(find dist -maxdepth 1 -type f -name "browser-use-rs-${RELEASE_TAG}-*-apple-darwin.tar.gz" -exec basename {} \; | LC_ALL=C sort | head -n 1)"
          test -n "${macos_archive}"
          linux_sha256="$(awk -v file="${linux_archive}" '$2 == file { print $1 }' dist/SHA256SUMS)"
          macos_sha256="$(awk -v file="${macos_archive}" '$2 == file { print $1 }' dist/SHA256SUMS)"
          test -n "${linux_sha256}"
          test -n "${macos_sha256}"
          archive_prefix="browser-use-rs-${RELEASE_TAG}-"
          macos_triple="${macos_archive#"${archive_prefix}"}"
          macos_triple="${macos_triple%.tar.gz}"
          sed \
            -e "s/__TAG__/${tag}/g" \
            -e "s/__VERSION__/${version}/g" \
            -e "s/__LINUX_ARCHIVE__/${linux_archive}/g" \
            -e "s/__LINUX_SHA256__/${linux_sha256}/g" \
            -e "s/__MACOS_ARCHIVE__/${macos_archive}/g" \
            -e "s/__MACOS_SHA256__/${macos_sha256}/g" \
            -e "s/__MACOS_TRIPLE__/${macos_triple}/g" \
            packaging/homebrew/browser-use-rs.rb.template \
            > dist/homebrew/browser-use-rs.rb
          ruby -c dist/homebrew/browser-use-rs.rb

      - name: Generate release notes
        shell: bash
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"
          {
            echo "# browser-use-rs ${RELEASE_TAG}"
            echo
            echo "## Release Plan"
            echo
            echo "- Bump: \`${RELEASE_TYPE:-exact}\`"
            echo "- Reason: ${RELEASE_REASON:-explicit release request}"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "## Changes Since ${previous_tag}"
              echo
              git log --pretty='- %s (%h)' "${previous_tag}..${RELEASE_TAG}"
            else
              echo "## Changes"
              echo
              git log --pretty='- %s (%h)' "${RELEASE_TAG}"
            fi
            echo
            echo "## Release Support Matrix"
            echo
            cat docs/RELEASE.md
          } > dist/RELEASE_NOTES.md

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          retention-days: 14
          name: browser-use-rs-release
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/homebrew/browser-use-rs.rb
            dist/RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/homebrew/browser-use-rs.rb
            dist/RELEASE_NOTES.md

      - name: Publish Homebrew tap formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH }}
        run: packaging/homebrew/publish-tap.sh dist/homebrew/browser-use-rs.rb
