name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-binary:
    name: Linux binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Build
        run: cargo build --release -p browser-use-cli

      - name: Package
        run: |
          mkdir -p dist/package
          cp target/release/browser-use-rs dist/package/browser-use-rs
          cp README.md LICENSE NOTICE dist/package/
          cp docs/RELEASE.md dist/package/RELEASE.md
          tar -C dist/package -czf "dist/browser-use-rs-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-use-rs-linux
          path: dist/*.tar.gz

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/RELEASE.md
          files: dist/*.tar.gz
