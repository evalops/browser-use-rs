name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-binary:
    name: Linux binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Build
        run: cargo build --release -p browser-use-cli

      - name: Package
        run: |
          mkdir -p dist/package/packaging/systemd dist/package/packaging/launchd
          cp target/release/browser-use-rs dist/package/browser-use-rs
          cp README.md LICENSE NOTICE dist/package/
          cp docs/RELEASE.md dist/package/RELEASE.md
          cp docs/DAEMON_SUPERVISION.md dist/package/DAEMON_SUPERVISION.md
          cp packaging/systemd/browser-use-rs.service dist/package/packaging/systemd/
          cp packaging/launchd/com.evalops.browser-use-rs.plist dist/package/packaging/launchd/
          tar -C dist/package -czf "dist/browser-use-rs-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" .

      - name: Smoke packaged artifact
        run: |
          mkdir -p dist/smoke
          tar -C dist/smoke -xzf "dist/browser-use-rs-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
          ./dist/smoke/browser-use-rs version-target
          ./dist/smoke/browser-use-rs state "data:text/html,<html><head><title>artifact smoke</title></head><body><button>Run</button><input placeholder='Name'></body></html>" > dist/smoke/state.json
          grep -q '"title": "artifact smoke"' dist/smoke/state.json
          grep -q '"interactive_elements": 2' dist/smoke/state.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-use-rs-linux
          path: dist/*.tar.gz

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/RELEASE.md
          files: dist/*.tar.gz
